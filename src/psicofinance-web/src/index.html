<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>PsicoFinance — Gestão para Clínicas de Psicologia</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Sistema de gestão financeira para clínicas de psicologia">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Fontes: Plus Jakarta Sans + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Prevenção de FOUC — aplica tema antes do Angular iniciar -->
  <script>
    (function() {
      var t = localStorage.getItem('psico-theme') || 'light';
      var c = localStorage.getItem('psico-color') || '1';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-color', c);
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#main-content">Pular para o conteúdo</a>
  <app-root></app-root>
</body>
</html>
